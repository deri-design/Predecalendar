name: Sync Groq Roadmap
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests groq
      - name: Run Scraper
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scraper.py
      - name: Push changes
        run: |
          git config --global user.name 'Groq-Bot'
          git config --global user.email 'bot@groq.ai'
          git add events.json
          git commit -m "Groq AI Update" || exit 0
          git push origin main
