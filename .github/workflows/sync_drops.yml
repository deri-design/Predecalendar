name: Sync Twitch Drops
on:
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours to catch new drops quickly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run Twitch GraphQL Scraper
        run: python twitch_drops.py
        
      - name: Commit and Push
        run: |
          git config --global user.name 'Twitch-Bot'
          git config --global user.email 'bot@twitch.tv'
          git add drops.json
          git commit -m "Sync Twitch Drops Status" || exit 0
          git push origin main
