name: Sync Twitch Drops
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: pip install requests
      - name: Run Scraper
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: python twitch_drops.py
      - name: Push changes
        run: |
          git config --global user.name 'Twitch-Bot'
          git config --global user.email 'bot@twitch.tv'
          git add drops.json
          git diff --staged --quiet || (git commit -m "Official API Drops Sync" && git push origin main)
