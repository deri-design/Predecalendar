<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predecessor | Live Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #06080d; 
            --bg-grid: rgba(255, 255, 255, 0.03);
            --gold: #dcb63b; 
            --teal: #37a9a9; 
            --border: #1e2638;
            --cell: #090e16; 
            --text: #c8d0e0;
            --header-bg: #0d131f;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-dark); 
            color: var(--text); 
            font-family: 'Rajdhani', sans-serif;
            background-image: linear-gradient(var(--bg-grid) 1px, transparent 1px), linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
            background-size: 40px 40px; 
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .container { max-width: 1700px; margin: 0 auto; width: 100%; }

        /* --- HEADER & STATUS --- */
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-family: 'Orbitron'; color: var(--gold); letter-spacing: 5px; font-size: 3rem; text-shadow: 0 0 20px rgba(220,182,59,0.2); }
        .status-bar { font-family: 'Orbitron'; font-size: 0.7rem; color: var(--teal); margin-top: 10px; letter-spacing: 2px; }

        .legend { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; font-size: 0.8rem; font-weight: bold; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .dot.patch { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .dot.news { background: var(--teal); box-shadow: 0 0 8px var(--teal); }

        .divider {
            display: flex; align-items: center; color: var(--gold); font-family: 'Orbitron'; font-size: 0.8rem; 
            letter-spacing: 3px; margin-bottom: 2rem; font-weight: 800;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .divider::before { margin-right: 20px; }
        .divider::after { margin-left: 20px; }

        /* --- CALENDAR LAYOUT --- */
        .calendars-wrapper { display: flex; gap: 1.5rem; width: 100%; align-items: flex-start; }
        .section { flex: 1; min-width: 0; }

        .month-name { 
            font-family: 'Orbitron'; color: var(--gold); margin-bottom: 1rem; text-align: center; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        .nav-btn { cursor: pointer; color: var(--text); padding: 5px 15px; border: 1px solid var(--border); transition: 0.2s; user-select: none; }
        .nav-btn:hover { background: #fff; color: #000; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        
        .head-cell { background: var(--header-bg); padding: 12px; text-align: center; font-size: 0.65rem; color: #5d7599; font-family: 'Orbitron'; }
        
        .cell { 
            background: var(--cell); 
            min-height: 150px; 
            max-height: 250px; 
            padding: 8px; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            scrollbar-width: thin; 
            scrollbar-color: var(--border) transparent; 
        }
        .cell::-webkit-scrollbar { width: 4px; }
        .cell::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .today { outline: 1px solid var(--gold); background: rgba(220, 182, 59, 0.08); z-index: 2; }
        .num { font-family: 'Orbitron'; font-size: 0.8rem; color: #5d7599; margin-bottom: 10px; }
        .active .num { color: var(--text); }
        .today .num { color: var(--gold); }

        /* --- EVENT CARDS --- */
        .event { 
            background: rgba(220, 182, 59, 0.1); 
            border-left: 3px solid var(--gold); 
            padding: 6px; 
            margin-bottom: 6px; 
            flex-shrink: 0;
            animation: fadeIn 0.5s ease;
        }
        .event.news { border-left-color: var(--teal); background: rgba(55, 169, 169, 0.1); }
        
        .event-title { font-weight: bold; color: var(--gold); margin-bottom: 4px; font-family: 'Orbitron'; font-size: 0.6rem; line-height: 1.2; }
        .event.news .event-title { color: var(--teal); }
        
        .event-desc { font-size: 0.65rem; color: #aaa; line-height: 1.3; margin-bottom: 6px; display: block; }
        
        .details-btn { 
            display: block; text-align: center; border: 1px solid rgba(255,255,255,0.2); 
            color: #fff; text-decoration: none; font-size: 0.55rem; padding: 3px; 
            font-family: 'Orbitron'; transition: 0.2s;
        }
        .details-btn:hover { background: #fff; color: #000; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 1300px) { .calendars-wrapper { flex-direction: column; gap: 3rem; } }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>PREDECESSOR LIVE ROADMAP</h1>
            <div id="status" class="status-bar">INITIALIZING DATA SYNC...</div>
        </header>

        <div class="legend">
            <span><div class="dot patch"></div> PATCH NOTES</span>
            <span><div class="dot news"></div> OFFICIAL NEWS</span>
        </div>

        <div class="divider">TEMPORAL VIEWPORT</div>

        <div class="calendars-wrapper">
            <!-- Previous Month -->
            <div class="section">
                <div class="month-name">
                    <div class="nav-btn" id="prev-btn">&lt; PREV</div>
                    <span id="label-1"></span>
                    <div style="width:50px"></div>
                </div>
                <div class="grid" id="grid-1"></div>
            </div>

            <!-- Current Month -->
            <div class="section">
                <div class="month-name" style="justify-content: center; color: #fff;">
                    <span id="label-2"></span>
                </div>
                <div class="grid" id="grid-2"></div>
            </div>

            <!-- Next Month -->
            <div class="section">
                <div class="month-name">
                    <div style="width:50px"></div>
                    <span id="label-3"></span>
                    <div class="nav-btn" id="next-btn">NEXT &gt;</div>
                </div>
                <div class="grid" id="grid-3"></div>
            </div>
        </div>
    </div>

    <script>
        let eventData = [];
        const today = new Date();
        // viewDate always tracks the start of the "Middle" calendar
        let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);

        // Helper to format date as YYYY-MM-DD exactly to match events.json
        const formatDate = (y, m, d) => `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

        async function init() {
            try {
                // Fetch with cache-busting timestamp
                const response = await fetch('./events.json?t=' + Date.now());
                const data = await response.json();
                
                // Ensure we handle array data correctly
                eventData = Array.isArray(data) ? data : [];
                
                document.getElementById('status').innerText = `LIVE SYNC ACTIVE (${eventData.length} EVENTS LOADED)`;
                console.log("Scraped Data:", eventData);
                renderAll();
            } catch (e) {
                console.error("Fetch error:", e);
                document.getElementById('status').innerText = "OFFLINE - UNABLE TO REACH EVENTS.JSON";
                renderAll(); // Still render calendar even if data fails
            }
        }

        function drawMonth(targetDate, gridId, labelId) {
            const grid = document.getElementById(gridId);
            const label = document.getElementById(labelId);
            const m = targetDate.getMonth(), y = targetDate.getFullYear();
            
            label.innerText = targetDate.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
            
            // Generate Headers
            grid.innerHTML = "MON TUE WED THU FRI SAT SUN".split(" ").map(d => `<div class="head-cell">${d}</div>`).join("");
            
            // Calculate Start Offset (Monday = 1, Sunday = 7)
            let firstDay = new Date(y, m, 1).getDay();
            firstDay = (firstDay === 0) ? 7 : firstDay;
            const daysInMonth = new Date(y, m + 1, 0).getDate();

            // Pad Empty Cells
            for (let i = 1; i < firstDay; i++) grid.innerHTML += `<div class="cell"></div>`;
            
            // Generate Days
            for (let d = 1; d <= daysInMonth; d++) {
                const currentStr = formatDate(y, m + 1, d);
                const matches = eventData.filter(e => e.date.trim() === currentStr);
                
                const isToday = d === today.getDate() && m === today.getMonth() && y === today.getFullYear();
                
                let eventsHtml = matches.map(e => `
                    <div class="event ${e.type === 'patch' ? '' : 'news'}">
                        <div class="event-title">${e.title}</div>
                        <span class="event-desc">${e.desc || 'Official Update'}</span>
                        <a href="${e.url}" target="_blank" class="details-btn">DETAILS ↗</a>
                    </div>`).join("");
                
                grid.innerHTML += `
                    <div class="cell active ${isToday ? 'today' : ''}">
                        <div class="num">${d}</div>
                        ${eventsHtml}
                    </div>`;
            }
        }

        function renderAll() {
            // Draw Previous Month
            drawMonth(new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1), 'grid-1', 'label-1');
            // Draw Current Month
            drawMonth(new Date(viewDate.getFullYear(), viewDate.getMonth(), 1), 'grid-2', 'label-2');
            // Draw Next Month
            drawMonth(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1), 'grid-3', 'label-3');
        }

        // Navigation listeners
        document.getElementById('prev-btn').addEventListener('click', () => {
            viewDate.setMonth(viewDate.getMonth() - 1);
            renderAll();
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            viewDate.setMonth(viewDate.getMonth() + 1);
            renderAll();
        });

        // Bootstrap
        init();
    </script>
</body>
</html>
