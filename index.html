<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predecessor | Live Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #dcb63b; 
            --teal: #37a9a9; 
            --red: #c73843;
            --twitch: #9146ff;
            --bg: #06080d; 
            --cell: #090e16; 
            --border: #1e2638; 
            --text: #c8d0e0; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; padding: 2rem; 
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); 
            background-size: 40px 40px; min-height: 100vh;
        }
        
        .container { max-width: 1800px; margin: 0 auto; width: 100%; }

        /* --- HEADER SECTION --- */
        .header { text-align: center; margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; }
        .omeda-badge {
            display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(220, 182, 59, 0.4);
            color: var(--gold); font-family: 'Orbitron'; font-size: 0.65rem; font-weight: 600; letter-spacing: 2px;
            padding: 4px 16px; background: rgba(9, 14, 22, 0.8); clip-path: polygon(6px 0, calc(100% - 6px) 0, 100% 100%, 0 100%);
            margin-bottom: 10px;
        }
        .header h1 { font-family: 'Orbitron'; color: var(--gold); letter-spacing: 8px; font-size: 3.5rem; text-transform: uppercase; margin-bottom: 5px; }
        .subtitle { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--text); letter-spacing: 4px; opacity: 0.6; text-transform: uppercase; }

        /* --- LEGEND --- */
        .legend { display: flex; justify-content: center; gap: 2rem; margin: 2rem 0; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 600; color: #888; letter-spacing: 1px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.patch { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .dot.hero { background: var(--teal); box-shadow: 0 0 8px var(--teal); }
        .dot.season { background: var(--red); box-shadow: 0 0 8px var(--red); }
        .dot.twitch { background: var(--twitch); box-shadow: 0 0 8px var(--twitch); }

        /* --- LIVE STATUS BANNER --- */
        .alert-box {
            background-color: rgba(220, 182, 59, 0.05); border: 1px solid rgba(220, 182, 59, 0.2);
            border-left: 4px solid var(--gold); padding: 12px 20px; display: flex; align-items: center; gap: 15px;
            margin: 0 auto 3rem auto; max-width: 900px; clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
        }
        .alert-box p { font-size: 0.95rem; font-weight: 500; letter-spacing: 0.5px; }
        .alert-box span { color: var(--gold); font-weight: bold; }

        .divider {
            display: flex; align-items: center; color: var(--gold); font-family: 'Orbitron'; font-size: 0.8rem; 
            letter-spacing: 4px; margin-bottom: 2rem; font-weight: 900;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border); }
        .divider::before { margin-right: 25px; }
        .divider::after { margin-left: 25px; }

        /* --- CALENDAR --- */
        .calendars { display: flex; gap: 1rem; position: relative; z-index: 1; }
        .section { flex: 1; min-width: 0; }
        .m-name { font-family: 'Orbitron'; color: var(--gold); text-align: center; margin-bottom: 1rem; font-size: 1.1rem; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .h-cell { background: #0d131f; padding: 10px; text-align: center; font-size: 0.6rem; color: #5d7599; font-family: 'Orbitron'; }
        
        .cell { background: var(--cell); min-height: 160px; max-height: 450px; padding: 5px; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: thin; position: relative; }
        .cell::-webkit-scrollbar { width: 4px; }
        .cell::-webkit-scrollbar-thumb { background: var(--border); }
        
        .num { font-family: 'Orbitron'; font-size: 0.8rem; color: #5d7599; margin: 4px; font-weight: bold; }
        .active .num { color: #fff; }
        .today { outline: 1px solid var(--gold); background: rgba(220, 182, 59, 0.05); }

        /* --- EVENT CARDS --- */
        .event { display: block; text-decoration: none; background: rgba(0, 0, 0, 0.8); margin-bottom: 8px; flex-shrink: 0; overflow: hidden; border-radius: 2px; transition: 0.2s; cursor: help; border: 1px solid var(--gold); }
        .event:hover { transform: translateY(-2px); border-color: #fff !important; }
        .event.patch { border-color: var(--gold); }
        .event.hero { border-color: var(--teal); }
        .event.season { border-color: var(--red); }
        .event.twitch { border-color: var(--twitch); }

        .event-img { width: 100%; height: 75px; object-fit: cover; display: block; background: #000; pointer-events: none; }
        .info { padding: 8px; pointer-events: none; }
        .e-title { font-weight: bold; color: var(--gold); font-family: 'Orbitron'; font-size: 0.55rem; line-height: 1.2; text-transform: uppercase; }
        .event.hero .e-title { color: var(--teal); }
        .event.season .e-title { color: var(--red); }
        .event.twitch .e-title { color: #bf94ff; }

        /* --- GLOBAL BRIEFING OVERLAY (200% SIZE + IMAGES) --- */
        #global-briefing {
            display: none;
            position: fixed; 
            width: 650px;
            max-height: 85vh;
            overflow-y: auto;
            background: #0d131f;
            border: 3px solid var(--gold);
            padding: 0; /* Removing padding to allow image to hit edges */
            z-index: 10000;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            pointer-events: none;
            backdrop-filter: blur(25px);
            scrollbar-width: thin;
        }

        .briefing-img {
            width: 100%;
            height: 250px; /* Cinematic height */
            object-fit: cover;
            border-bottom: 3px solid var(--border);
            display: none; /* Hidden unless event has image */
        }

        .briefing-content {
            padding: 30px;
        }

        .briefing-tag { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--gold); letter-spacing: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 12px; display: block; }
        
        .briefing-desc { 
            font-size: 1.8rem; 
            line-height: 1.5; 
            color: #fff; 
            text-shadow: 0 2px 4px #000; 
            font-weight: 500; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
        }

        .briefing-date { display: block; margin-top: 30px; font-size: 1.3rem; color: var(--teal); font-family: 'Orbitron'; border-top: 2px solid var(--border); padding-top: 15px; }

        @media (max-width: 1400px) { .calendars { flex-direction: column; gap: 4rem; } #global-briefing { width: 95%; left: 2.5% !important; top: 50% !important; transform: translateY(-50%); } }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="omeda-badge"><div class="dot patch" style="width:6px; height:6px;"></div> OMEDA STUDIOS · OFFICIAL</div>
            <h1>PREDECESSOR</h1>
            <div class="subtitle">PATCH & HERO ROADMAP</div>
        </header>

        <div class="legend">
            <div class="legend-item"><div class="dot patch"></div> PATCH RELEASE</div>
            <div class="legend-item"><div class="dot hero"></div> NEW HERO / DEV</div>
            <div class="legend-item"><div class="dot season"></div> SEASON / EVENT</div>
            <div class="legend-item"><div class="dot twitch"></div> TWITCH STREAM</div>
        </div>

        <div class="alert-box">
            <div class="dot patch"></div>
            <p><span>LIVE STATUS:</span> V1.12.6 is the current version. Next major update (V1.13) estimated mid-April 2026.</p>
        </div>

        <div class="divider">CHRONOLOGICAL OVERVIEW</div>

        <div class="calendars">
            <div class="section"><h2 class="m-name" id="l1"></h2><div class="grid" id="g1"></div></div>
            <div class="section"><h2 class="m-name" id="l2"></h2><div class="grid" id="g2"></div></div>
            <div class="section"><h2 class="m-name" id="l3"></h2><div class="grid" id="g3"></div></div>
        </div>
    </div>

    <!-- The Pop-up Overlay -->
    <div id="global-briefing">
        <img id="b-img" class="briefing-img" src="" alt="Tactical Visual">
        <div class="briefing-content">
            <span id="b-tag" class="briefing-tag"></span>
            <div id="b-desc" class="briefing-desc"></div>
            <span id="b-date" class="briefing-date"></span>
        </div>
    </div>

    <script>
        let evData = []; const today = new Date();
        let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);
        const briefing = document.getElementById('global-briefing');
        const bImg = document.getElementById('b-img');

        async function init() {
            try {
                const r = await fetch('./events.json?t=' + Date.now());
                const data = await r.json();
                evData = data.events || [];
                render();
            } catch(e) { render(); }
        }

        function showBriefing(e, eventObj) {
            const rect = e.currentTarget.getBoundingClientRect();
            let categoryColor = "var(--gold)";
            if(eventObj.type === "hero") categoryColor = "var(--teal)";
            if(eventObj.type === "season") categoryColor = "var(--red)";
            if(eventObj.type === "twitch") categoryColor = "var(--twitch)";

            briefing.style.borderColor = categoryColor;
            document.getElementById('b-tag').style.color = categoryColor;
            document.getElementById('b-tag').innerText = `RAW DISCORD INTEL // ${eventObj.type.toUpperCase()}`;
            document.getElementById('b-desc').innerText = eventObj.desc;
            document.getElementById('b-date').innerText = `TARGET DEPLOYMENT: ${eventObj.date}`;
            
            // Handle Image inside Pop-up
            if (eventObj.image) {
                bImg.src = eventObj.image;
                bImg.style.display = 'block';
            } else {
                bImg.style.display = 'none';
            }

            briefing.style.display = 'block';
            
            // Intelligent Positioning
            let x = rect.left + rect.width + 20;
            let y = rect.top;
            if (x + 650 > window.innerWidth) x = rect.left - 670;
            if (y + briefing.offsetHeight > window.innerHeight) y = window.innerHeight - briefing.offsetHeight - 40;
            
            briefing.style.left = x + 'px'; 
            briefing.style.top = Math.max(40, y) + 'px';
        }

        function hideBriefing() { briefing.style.display = 'none'; }

        function draw(date, gId, lId) {
            const g = document.getElementById(gId), l = document.getElementById(lId);
            const m = date.getMonth(), y = date.getFullYear();
            l.innerText = date.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
            g.innerHTML = "MON TUE WED THU FRI SAT SUN".split(" ").map(d => `<div class="h-cell">${d}</div>`).join("");
            let start = new Date(y, m, 1).getDay(); start = (start === 0) ? 7 : start;
            const count = new Date(y, m + 1, 0).getDate();
            for (let i = 1; i < start; i++) g.innerHTML += `<div class="cell"></div>`;
            for (let d = 1; d <= count; d++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const items = evData.filter(e => e.date === dStr);
                const isT = d===today.getDate() && m===today.getMonth() && y===today.getFullYear();
                let dayCell = document.createElement('div');
                dayCell.className = `cell active ${isT?'today':''}`;
                dayCell.innerHTML = `<div class="num">${d}</div>`;
                items.forEach(ev => {
                    let a = document.createElement('a');
                    a.href = ev.url || '#'; a.target = "_blank"; a.className = `event ${ev.type}`;
                    a.innerHTML = `${ev.image ? `<img src="${ev.image}" class="event-img">` : ''}<div class="info"><div class="e-title">${ev.title}</div></div>`;
                    a.addEventListener('mouseenter', (e) => showBriefing(e, ev));
                    a.addEventListener('mouseleave', hideBriefing);
                    dayCell.appendChild(a);
                });
                g.appendChild(dayCell);
            }
        }

        function render() {
            draw(new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1), 'g1', 'l1');
            draw(new Date(viewDate.getFullYear(), viewDate.getMonth(), 1), 'g2', 'l2');
            draw(new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1), 'g3', 'l3');
        }
        init();
    </script>
</body>
</html>
