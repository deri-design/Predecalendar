<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predecessor | Live Roadmap HUD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #dcb63b; --teal: #37a9a9; --red: #c73843; --twitch: #9146ff;
            --bg: #06080d; --cell: #090e16; --border: #1e2638; --text: #c8d0e0; 
            --hud-glow: rgba(55, 169, 169, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; padding: 2rem 1rem; 
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); 
            background-size: 40px 40px; min-height: 100vh;
        }
        
        .container { max-width: 1400px; margin: 0 auto; width: 100%; }

        /* --- HEADER SECTION --- */
        .header { text-align: center; margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; }
        .header h1 { font-family: 'Orbitron'; color: var(--gold); letter-spacing: 10px; font-size: 3.5rem; text-transform: uppercase; margin: 0; }

        /* --- FANCY COUNTDOWN HUD --- */
        .countdown-container {
            width: 100%; max-width: 800px; margin: 0 auto 3rem auto;
            background: rgba(13, 19, 31, 0.8); border: 1px solid var(--teal);
            border-bottom: 4px solid var(--teal); padding: 25px; position: relative;
            box-shadow: 0 0 30px rgba(55, 169, 169, 0.15), inset 0 0 15px rgba(55, 169, 169, 0.1);
            clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            animation: hudPulse 4s infinite ease-in-out;
        }
        
        @keyframes hudPulse { 0%, 100% { border-color: var(--teal); box-shadow: 0 0 20px rgba(55,169,169,0.1); } 50% { border-color: #64ffff; box-shadow: 0 0 40px rgba(55,169,169,0.3); } }

        /* Event Title now sits at the top of the HUD */
        .next-op-title { font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px #fff; text-transform: uppercase; letter-spacing: 3px; text-align: center; }

        .timer-hud { display: flex; gap: 20px; }
        .timer-unit { display: flex; flex-direction: column; align-items: center; min-width: 80px; }
        .timer-val { 
            font-family: 'Orbitron'; font-size: 2.5rem; font-weight: 900; color: #fff; 
            line-height: 1; text-shadow: 0 0 15px var(--hud-glow); 
            background: rgba(255,255,255,0.03); padding: 10px; border-radius: 4px;
            border-bottom: 2px solid var(--teal); width: 100%; text-align: center;
        }
        .timer-label { font-size: 0.6rem; font-family: 'Orbitron'; color: var(--teal); margin-top: 5px; letter-spacing: 2px; }

        /* --- LEGEND --- */
        .legend { display: flex; justify-content: center; gap: 2rem; margin-bottom: 3rem; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 600; color: #888; letter-spacing: 1px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.patch { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
        .dot.hero { background: var(--teal); box-shadow: 0 0 8px var(--teal); }
        .dot.season { background: var(--red); box-shadow: 0 0 8px var(--red); }
        .dot.twitch { background: var(--twitch); box-shadow: 0 0 8px var(--twitch); }

        /* --- CALENDAR (2 COLUMN) --- */
        .calendars { display: flex; gap: 1.5rem; position: relative; z-index: 1; }
        .section { flex: 1; min-width: 0; }
        .m-name { font-family: 'Orbitron'; color: var(--gold); text-align: center; margin-bottom: 1.2rem; font-size: 1.2rem; letter-spacing: 3px; }
        
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .h-cell { background: #0d131f; padding: 12px; text-align: center; font-size: 0.6rem; color: #5d7599; font-family: 'Orbitron'; font-weight: bold; }
        
        .cell { background: var(--cell); min-height: 160px; max-height: 480px; padding: 6px; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: thin; position: relative; }
        .cell::-webkit-scrollbar { width: 4px; }
        .cell::-webkit-scrollbar-thumb { background: var(--border); }
        
        .num { font-family: 'Orbitron'; font-size: 0.8rem; color: #5d7599; margin: 4px; font-weight: bold; }
        .active .num { color: #fff; }
        .today { outline: 1px solid var(--gold); background: rgba(220, 182, 59, 0.05); }

        .event { display: block; text-decoration: none; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--gold); margin-bottom: 8px; flex-shrink: 0; overflow: hidden; border-radius: 2px; transition: 0.2s; cursor: help; }
        .event:hover { border-color: #fff !important; transform: translateY(-2px); }
        .event.patch { border-color: var(--gold); }
        .event.hero { border-color: var(--teal); }
        .event.season { border-color: var(--red); }
        .event.twitch { border-color: var(--twitch); }

        .event-img { width: 100%; height: 75px; object-fit: cover; display: block; background: #000; pointer-events: none; }
        .info { padding: 8px; pointer-events: none; }
        .e-title { font-weight: bold; color: var(--gold); font-family: 'Orbitron'; font-size: 0.55rem; line-height: 1.2; text-transform: uppercase; }
        .event.hero .e-title { color: var(--teal); }
        .event.season .e-title { color: var(--red); }
        .event.twitch .e-title { color: #bf94ff; }

        /* --- POPUP OVERLAY --- */
        #global-briefing {
            display: none; position: fixed; width: 450px; max-height: 85vh; overflow-y: auto;
            background: #0d131f; border: 2px solid var(--gold); padding: 0; z-index: 10000;
            box-shadow: 0 0 100px rgba(0,0,0,1); pointer-events: none; backdrop-filter: blur(25px);
            scrollbar-width: thin;
        }
        .briefing-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid var(--border); display: none; }
        .briefing-content { padding: 25px; }
        .briefing-tag { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; display: block; text-transform: uppercase; }
        .briefing-desc { font-size: 18px; line-height: 1.6; color: #fff; text-shadow: 0 1px 2px #000; font-weight: 500; white-space: pre-wrap; word-wrap: break-word; }

        @media (max-width: 1000px) { .calendars { flex-direction: column; gap: 3rem; } #global-briefing { width: 95%; left: 2.5% !important; top: 50% !important; transform: translateY(-50%); } .header h1 { font-size: 2.2rem; } }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>PREDECESSOR</h1>
        </header>

        <!-- Dynamic Timer HUD -->
        <div class="countdown-container" id="hud">
            <div class="next-op-title" id="op-title">STANDBY</div>
            <div class="timer-hud">
                <div class="timer-unit"><div class="timer-val" id="d">00</div><div class="timer-label">DAYS</div></div>
                <div class="timer-unit"><div class="timer-val" id="h">00</div><div class="timer-label">HRS</div></div>
                <div class="timer-unit"><div class="timer-val" id="m">00</div><div class="timer-label">MIN</div></div>
                <div class="timer-unit"><div class="timer-val" id="s">00</div><div class="timer-label">SEC</div></div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="dot patch"></div> PATCH RELEASE</div>
            <div class="legend-item"><div class="dot hero"></div> NEW HERO / DEV</div>
            <div class="legend-item"><div class="dot season"></div> SEASON / EVENT</div>
            <div class="legend-item"><div class="dot twitch"></div> TWITCH STREAM</div>
        </div>

        <div class="calendars">
            <div class="section"><h2 class="m-name" id="l1"></h2><div class="grid" id="g1"></div></div>
            <div class="section"><h2 class="m-name" id="l2"></h2><div class="grid" id="g2"></div></div>
        </div>
    </div>

    <div id="global-briefing">
        <img id="b-img" class="briefing-img" src="" alt="Visual">
        <div class="briefing-content">
            <span id="b-tag" class="briefing-tag"></span>
            <div id="b-desc" class="briefing-desc"></div>
        </div>
    </div>

    <script>
        let evData = []; const today = new Date();
        let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);
        const briefing = document.getElementById('global-briefing');
        const bImg = document.getElementById('b-img');

        async function init() {
            try {
                const r = await fetch('./events.json?t=' + Date.now());
                const data = await r.json();
                evData = data.events || [];
                setupCountdown();
                render();
            } catch(e) { render(); }
        }

        function setupCountdown() {
            const now = new Date().getTime();
            const futureEvents = evData
                .map(e => ({ ...e, time: new Date(e.date + "T00:00:00").getTime() }))
                .filter(e => e.time > now)
                .sort((a, b) => a.time - b.time);

            if (futureEvents.length > 0) {
                const nextEv = futureEvents[0];
                document.getElementById('op-title').innerText = nextEv.title;
                
                setInterval(() => {
                    const current = new Date().getTime();
                    const diff = nextEv.time - current;
                    if (diff < 0) return;
                    
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const secs = Math.floor((diff % (1000 * 60)) / 1000);

                    document.getElementById('d').innerText = String(days).padStart(2, '0');
                    document.getElementById('h').innerText = String(hours).padStart(2, '0');
                    document.getElementById('m').innerText = String(mins).padStart(2, '0');
                    document.getElementById('s').innerText = String(secs).padStart(2, '0');
                }, 1000);
            } else {
                document.getElementById('op-title').innerText = "NO UPCOMING DATA";
            }
        }

        function showBriefing(e, eventObj) {
            const rect = e.currentTarget.getBoundingClientRect();
            let categoryColor = "var(--gold)";
            if(eventObj.type === "hero") categoryColor = "var(--teal)";
            if(eventObj.type === "season") categoryColor = "var(--red)";
            if(eventObj.type === "twitch") categoryColor = "var(--twitch)";

            briefing.style.borderColor = categoryColor;
            document.getElementById('b-tag').style.color = categoryColor;
            document.getElementById('b-tag').innerText = eventObj.title;
            document.getElementById('b-desc').innerText = eventObj.desc;
            if (eventObj.image) { bImg.src = eventObj.image; bImg.style.display = 'block'; } else { bImg.style.display = 'none'; }
            briefing.style.display = 'block';
            let x = rect.left + rect.width + 20; let y = rect.top;
            if (x + 450 > window.innerWidth) x = rect.left - 470;
            if (y + briefing.offsetHeight > window.innerHeight) y = window.innerHeight - briefing.offsetHeight - 40;
            briefing.style.left = x + 'px'; briefing.style.top = Math.max(40, y) + 'px';
        }

        function hideBriefing() { briefing.style.display = 'none'; }

        function draw(date, gId, lId) {
            const g = document.getElementById(gId), l = document.getElementById(lId);
            const m = date.getMonth(), y = date.getFullYear();
            l.innerText = date.toLocaleString('default', { month: 'long' }).toUpperCase();
            g.innerHTML = "MON TUE WED THU FRI SAT SUN".split(" ").map(d => `<div class="h-cell">${d}</div>`).join("");
            let start = new Date(y, m, 1).getDay(); start = (start === 0) ? 7 : start;
            const count = new Date(y, m + 1, 0).getDate();
            for (let i = 1; i < start; i++) g.innerHTML += `<div class="cell"></div>`;
            for (let d = 1; d <= count; d++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const items = evData.filter(e => e.date === dStr);
                const isT = d===today.getDate() && m===today.getMonth() && y===today.getFullYear();
                let dayCell = document.createElement('div');
                dayCell.className = `cell active ${isT?'today':''}`;
                dayCell.innerHTML = `<div class="num">${d}</div>`;
                items.forEach(ev => {
                    let a = document.createElement('a');
                    a.href = ev.url || '#'; a.target = "_blank"; a.className = `event ${ev.type}`;
                    a.innerHTML = `<div class="info"><div class="e-title">${ev.title}</div></div>`;
                    a.addEventListener('mouseenter', (e) => showBriefing(e, ev));
                    a.addEventListener('mouseleave', hideBriefing);
                    dayCell.appendChild(a);
                });
                g.appendChild(dayCell);
            }
        }

        function render() {
            // Draw only Current and Next Month
            draw(new Date(viewDate.getFullYear(), viewDate.getMonth(), 1), 'g1', 'l1');
            draw(new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1), 'g2', 'l2');
        }
        init();
    </script>
</body>
</html>
