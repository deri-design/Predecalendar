<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predecessor | Live Roadmap</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #dcb63b; --teal: #37a9a9; --bg: #06080d; --cell: #090e16; --border: #1e2638; --text: #c8d0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; padding: 2rem; 
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); 
            background-size: 40px 40px; 
        }
        .header { text-align: center; margin-bottom: 3rem; }
        .header h1 { font-family: 'Orbitron'; color: var(--gold); letter-spacing: 5px; font-size: 3rem; }
        .calendars { display: flex; gap: 1rem; }
        .section { flex: 1; min-width: 0; }
        .m-name { font-family: 'Orbitron'; color: var(--gold); text-align: center; margin-bottom: 1rem; font-size: 1.2rem; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .h-cell { background: #0d131f; padding: 10px; text-align: center; font-size: 0.6rem; color: #5d7599; font-family: 'Orbitron'; }
        .cell { background: var(--cell); min-height: 150px; padding: 6px; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: thin; }
        .cell.today { outline: 1px solid var(--gold); background: rgba(220,182,59,0.1); }
        .num { font-family: 'Orbitron'; font-size: 0.8rem; color: #5d7599; margin-bottom: 8px; }
        .active .num { color: #fff; }
        .event { background: rgba(220,182,59,0.1); border-left: 3px solid var(--gold); padding: 5px; margin-bottom: 5px; font-size: 0.6rem; line-height: 1.2; }
        .event.news { border-left-color: var(--teal); background: rgba(55, 169, 169, 0.1); }
        .e-title { font-family: 'Orbitron'; font-weight: bold; color: var(--gold); margin-bottom: 4px; display: block; overflow: hidden; text-overflow: ellipsis; }
        .event.news .e-title { color: var(--teal); }
        .btn { display: block; text-align: center; border: 1px solid rgba(255,255,255,0.2); color: #fff; text-decoration: none; padding: 2px; font-size: 0.5rem; font-family: 'Orbitron'; margin-top: 4px; }
        .btn:hover { background: #fff; color: #000; }
        @media (max-width: 1400px) { .calendars { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="header"><h1>PREDECESSOR LIVE ROADMAP</h1><p id="st" style="color:var(--teal); font-family: 'Orbitron'; font-size: 0.8rem; margin-top: 10px;">Syncing...</p></div>
    <div class="calendars">
        <div class="section"><h2 class="m-name" id="l1"></h2><div class="grid" id="g1"></div></div>
        <div class="section"><h2 class="m-name" id="l2"></h2><div class="grid" id="g2"></div></div>
        <div class="section"><h2 class="m-name" id="l3"></h2><div class="grid" id="g3"></div></div>
    </div>
    <script>
        let evs = []; const today = new Date();
        async function init() {
            try {
                const r = await fetch('./events.json?t=' + Date.now());
                evs = await r.json();
                document.getElementById('st').innerText = `LIVE SYNC ACTIVE: ${evs.length} EVENTS LOADED`;
            } catch(e) { document.getElementById('st').innerText = "Syncing with GitHub..."; }
            render();
        }
        function draw(date, gId, lId) {
            const g = document.getElementById(gId), l = document.getElementById(lId);
            const m = date.getMonth(), y = date.getFullYear();
            l.innerText = date.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
            g.innerHTML = "MON TUE WED THU FRI SAT SUN".split(" ").map(d => `<div class="h-cell">${d}</div>`).join("");
            let start = new Date(y, m, 1).getDay(); start = (start === 0) ? 7 : start;
            const count = new Date(y, m + 1, 0).getDate();
            for (let i = 1; i < start; i++) g.innerHTML += `<div class="cell"></div>`;
            for (let d = 1; d <= count; d++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const items = evs.filter(e => e.date === dStr);
                const isT = d===today.getDate() && m===today.getMonth() && y===today.getFullYear();
                let html = `<div class="cell active ${isT?'today':''}"><div class="num">${d}</div>`;
                items.forEach(e => {
                    html += `<div class="event ${e.type==='patch'?'':'news'}"><span class="e-title">${e.title}</span><a href="${e.url}" target="_blank" class="btn">DETAILS ↗</a></div>`;
                });
                g.innerHTML += html + `</div>`;
            }
        }
        function render() {
            draw(new Date(today.getFullYear(), today.getMonth()-1, 1), 'g1', 'l1');
            draw(new Date(today.getFullYear(), today.getMonth(), 1), 'g2', 'l2');
            draw(new Date(today.getFullYear(), today.getMonth()+1, 1), 'g3', 'l3');
        }
        init();
    </script>
</body>
</html>
