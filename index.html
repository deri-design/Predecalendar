<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredeCalendar | Live Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- CUSTOM FONT LOADING --- */
        @font-face {
            font-family: 'StoricaHeavy';
            src: url('./fonts/Storica-Heavy.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root { 
            --gold-light: #FBEB61; 
            --gold-dark: #C48400;  
            --gold: #dcb63b; 
            --teal: #37a9a9; 
            --red: #c73843; 
            --twitch: #9146ff; 
            --bg: #06080d; 
            --border: rgba(220, 182, 59, 0.2); 
            --text: #c8d0e0; 
            --hud-glow: rgba(220, 182, 59, 0.4);
            --glass-blur: blur(25px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Rajdhani', sans-serif; 
            padding: 2rem 1rem; 
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* --- STYLED BACKGROUND WITH 25% OPACITY --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('./img/bg.jpg') no-repeat center center;
            background-size: cover;
            opacity: 0.25; /* UPDATED TO 25% */
            mix-blend-mode: luminosity;
            z-index: -1;
            pointer-events: none;
        }
        
        .container { max-width: 1600px; margin: 0 auto; width: 100%; position: relative; z-index: 1; }

        /* --- HEADER SECTION --- */
        .header { text-align: center; margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; }
        
        .header h1 { 
            font-family: 'StoricaHeavy', sans-serif; 
            font-size: 4.5rem; 
            text-transform: uppercase; 
            margin: 0; 
            letter-spacing: 2px;
            background: linear-gradient(to bottom, var(--gold-light) 20%, var(--gold-dark) 90%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
        }

        .subline {
            font-family: 'Rajdhani', sans-serif;
            color: #ffffff;
            font-size: 1.1rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        /* --- COUNTDOWN HUD (GLASS ONLY) --- */
        .countdown-container { 
            width: 100%; 
            max-width: 750px; 
            margin: 0 auto 3rem auto; 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--gold); 
            border-bottom: 3px solid var(--gold); 
            padding: 20px; 
            position: relative; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.4); 
            clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            animation: hudPulse 4s infinite; 
        }
        
        @keyframes hudPulse { 
            0%, 100% { border-color: var(--gold); } 
            50% { border-color: var(--gold-light); } 
        }

        .next-op-title { 
            font-family: 'Orbitron'; 
            font-size: 1.4rem; 
            color: #fff; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            text-align: center; 
            line-height: 1.4; 
        }
        
        .timer-hud { display: flex; gap: 15px; }
        .timer-unit { display: flex; flex-direction: column; align-items: center; }
        
        .timer-val { 
            font-family: 'StoricaHeavy', sans-serif; 
            font-size: 2.2rem; 
            font-weight: normal; 
            color: #fff; 
            background: rgba(0,0,0,0.3); 
            padding: 8px 0; 
            border-radius: 4px; 
            border-bottom: 2px solid var(--gold); 
            width: 85px; 
            text-align: center; 
        }
        .timer-label { font-size: 0.55rem; font-family: 'Orbitron'; color: var(--gold); margin-top: 5px; letter-spacing: 2px; }

        .twitch-cta {
            display: none;
            margin-top: 5px;
            padding: 8px 25px;
            background: var(--twitch);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 2px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .twitch-cta:hover { background: #a970ff; transform: translateY(-2px); }

        /* --- LEGEND --- */
        .legend { display: flex; justify-content: center; gap: 2rem; margin-bottom: 3rem; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; font-weight: 700; color: #fff; letter-spacing: 1px; text-shadow: 0 2px 4px #000; }
        .dot { width: 10px; height: 10px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }
        .dot.patch { background: var(--gold); } 
        .dot.hero { background: var(--teal); } 
        .dot.season { background: var(--red); } 
        .dot.twitch { background: var(--twitch); }

        /* --- ROADMAP GRID (GLASS EFFECT) --- */
        .roadmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); position: relative; z-index: 1; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        
        .h-cell { 
            background: rgba(13, 19, 31, 0.8); 
            backdrop-filter: blur(10px);
            padding: 15px; text-align: center; font-size: 0.7rem; color: #5d7599; font-family: 'Orbitron'; font-weight: bold; letter-spacing: 2px; 
        }
        
        .cell { 
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            min-height: 160px; 
            max-height: 480px; 
            padding: 8px; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            scrollbar-width: thin; 
            position: relative; 
        }
        .cell.weekend { background: rgba(255, 255, 255, 0.05); }

        .num-container { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .num { font-family: 'Orbitron'; font-size: 0.85rem; color: #fff; font-weight: bold; text-shadow: 0 1px 3px #000; }
        .month-tag { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--gold); opacity: 0.8; }
        
        .cell.today { outline: 2px solid var(--gold); background: rgba(220, 182, 59, 0.1); z-index: 2; }
        .cell.today .num { color: var(--gold); }
        
        .event { display: block; text-decoration: none; background: rgba(0, 0, 0, 0.7); border: 1px solid var(--gold); margin-bottom: 8px; flex-shrink: 0; overflow: hidden; border-radius: 2px; transition: 0.2s; cursor: pointer; padding: 8px; }
        .event:hover { border-color: #fff !important; transform: translateY(-2px); background: rgba(255,255,255,0.05); }
        .event.patch { border-color: var(--gold); } .event.hero { border-color: var(--teal); } .event.season { border-color: var(--red); } .event.twitch { border-color: var(--twitch); }
        .e-title { font-weight: bold; color: var(--gold); font-family: 'Orbitron'; font-size: 0.55rem; line-height: 1.2; text-transform: uppercase; }
        .event.hero .e-title { color: var(--teal); } .event.season .e-title { color: var(--red); } .event.twitch .e-title { color: #bf94ff; }

        /* --- POPUP OVERLAY (GLASS EFFECT) --- */
        #global-briefing { 
            display: none; position: fixed; width: 450px; max-height: 85vh; overflow-y: auto; 
            background: rgba(13, 19, 31, 0.85); 
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 2px solid var(--gold); 
            padding: 0; z-index: 10000; box-shadow: 0 0 100px rgba(0,0,0,1); 
            pointer-events: none; scrollbar-width: thin; 
        }
        .briefing-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid rgba(255,255,255,0.1); display: none; }
        .briefing-content { padding: 25px; }
        .briefing-tag { font-family: 'Orbitron'; font-size: 1rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: block; text-transform: uppercase; }
        .briefing-desc { font-size: 18px; line-height: 1.6; color: #fff; text-shadow: 0 1px 3px #000; font-weight: 500; white-space: pre-wrap; word-wrap: break-word; }

        @media (max-width: 1000px) { .roadmap-grid { grid-template-columns: repeat(1, 1fr); } #global-briefing { width: 95%; left: 2.5% !important; top: 50% !important; transform: translateY(-50%); } .header h1 { font-size: 2.5rem; } }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>PredeCalendar</h1>
            <div class="subline">Unofficial Predecessor Event Calendar</div>
        </header>

        <!-- Dynamic Timer HUD -->
        <div class="countdown-container" id="hud">
            <div class="next-op-title" id="op-title">STANDBY</div>
            <div class="timer-hud">
                <div class="timer-unit"><div class="timer-val" id="d">00</div><div class="timer-label">DAYS</div></div>
                <div class="timer-unit"><div class="timer-val" id="h">00</div><div class="timer-label">HRS</div></div>
                <div class="timer-unit"><div class="timer-val" id="m">00</div><div class="timer-label">MIN</div></div>
                <div class="timer-unit"><div class="timer-val" id="s">00</div><div class="timer-label">SEC</div></div>
            </div>
            <a href="https://www.twitch.tv/predecessorgame" target="_blank" class="twitch-cta" id="twitch-btn">Official Twitch Channel →</a>
        </div>

        <div class="legend">
            <div class="legend-item"><div class="dot patch"></div> PATCH RELEASE</div>
            <div class="legend-item"><div class="dot hero"></div> HERO RELEASE</div>
            <div class="legend-item"><div class="dot season"></div> SEASON / EVENT</div>
            <div class="legend-item"><div class="dot twitch"></div> TWITCH STREAM</div>
        </div>

        <div class="roadmap-grid" id="main-grid"></div>
    </div>

    <div id="global-briefing">
        <img id="b-img" class="briefing-img" src="" alt="Visual">
        <div class="briefing-content"><span id="b-tag" class="briefing-tag"></span><div id="b-desc" class="briefing-desc"></div></div>
    </div>

    <script>
        let evData = []; const today = new Date();
        const briefing = document.getElementById('global-briefing'), bImg = document.getElementById('b-img');

        async function init() {
            try {
                const r = await fetch('./events.json?t=' + Date.now());
                const data = await r.json();
                evData = data.events || [];
                setupCountdown();
                renderRoadmap();
            } catch(e) { renderRoadmap(); }
        }

        function setupCountdown() {
            const now = Date.now();
            const futureEvents = evData.map(e => ({ ...e, time: Date.parse(e.iso_date || e.date + "T00:00:00Z") })).filter(e => e.time > now).sort((a, b) => a.time - b.time);
            
            if (futureEvents.length > 0) {
                const nextEv = futureEvents[0]; 
                document.getElementById('op-title').innerText = "NEXT EVENT: " + nextEv.title;

                if (nextEv.type === 'twitch') {
                    document.getElementById('twitch-btn').style.display = 'inline-block';
                } else {
                    document.getElementById('twitch-btn').style.display = 'none';
                }

                setInterval(() => {
                    const diff = nextEv.time - Date.now();
                    if (diff < 0) { window.location.reload(); return; }
                    document.getElementById('d').innerText = String(Math.floor(diff/864e5)).padStart(2,'0');
                    document.getElementById('h').innerText = String(Math.floor((diff%864e5)/36e5)).padStart(2,'0');
                    document.getElementById('m').innerText = String(Math.floor((diff%36e5)/6e4)).padStart(2,'0');
                    document.getElementById('s').innerText = String(Math.floor((diff%6e4)/1000)).padStart(2,'0');
                }, 1000);
            } else { 
                document.getElementById('op-title').innerText = "NO UPCOMING OPS"; 
                document.getElementById('twitch-btn').style.display = 'none';
            }
        }

        function renderRoadmap() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "MON TUE WED THU FRI SAT SUN".split(" ").map(d => `<div class="h-cell">${d}</div>`).join("");

            let startDate = new Date(); startDate.setDate(startDate.getDate() - 10);
            let dayOffset = startDate.getDay(); startDate.setDate(startDate.getDate() - (dayOffset === 0 ? 6 : dayOffset - 1));
            
            let endDate = new Date(); endDate.setDate(endDate.getDate() + 15);
            let endDayOffset = endDate.getDay(); endDate.setDate(endDate.getDate() + (endDayOffset === 0 ? 0 : 7 - endDayOffset) + 7);

            let cursor = new Date(startDate);
            while (cursor <= endDate) {
                const dStr = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(cursor.getDate()).padStart(2,'0')}`;
                const items = evData.filter(e => e.date === dStr);
                const isToday = cursor.toDateString() === today.toDateString();
                const isWeekend = cursor.getDay() === 0 || cursor.getDay() === 6;

                const cell = document.createElement('div');
                cell.className = `cell active ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}`;
                cell.innerHTML = `<div class="num-container"><span class="num">${cursor.getDate()}</span><span class="month-tag">${cursor.toLocaleString('default',{month:'short'}).toUpperCase()}</span></div>`;
                
                items.forEach(ev => {
                    let a = document.createElement('a'); a.href = ev.url || '#'; a.target = "_blank"; a.className = `event ${ev.type}`;
                    a.innerHTML = `<div class="e-title">${ev.title}</div>`;
                    a.addEventListener('mouseenter', (e) => {
                        const rect = e.currentTarget.getBoundingClientRect();
                        let color = "var(--gold)"; 
                        if(ev.type === "hero") color = "var(--teal)"; if(ev.type === "season") color = "var(--red)"; if(ev.type === "twitch") color = "var(--twitch)";
                        briefing.style.borderColor = color; document.getElementById('b-tag').style.color = color;
                        document.getElementById('b-tag').innerText = ev.title; document.getElementById('b-desc').innerText = ev.desc;
                        if (ev.image) { bImg.src = ev.image; bImg.style.display = 'block'; } else { bImg.style.display = 'none'; }
                        briefing.style.display = 'block';
                        let x = rect.left + rect.width + 20, y = rect.top;
                        if (x + 450 > window.innerWidth) x = rect.left - 470;
                        if (y + briefing.offsetHeight > window.innerHeight) y = window.innerHeight - briefing.offsetHeight - 40;
                        briefing.style.left = x + 'px'; briefing.style.top = Math.max(40, y) + 'px';
                    });
                    a.addEventListener('mouseleave', () => briefing.style.display = 'none');
                    cell.appendChild(a);
                });
                grid.appendChild(cell);
                cursor.setDate(cursor.getDate() + 1);
            }
        }
        init();
    </script>
</body>
</html>
