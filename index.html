<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predecessor | Live Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #dcb63b; --teal: #37a9a9; --red: #c73843; --twitch: #9146ff; --bg: #06080d; --cell: #090e16; --border: #1e2638; --text: #c8d0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; padding: 2rem; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 40px 40px; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-family: 'Orbitron'; color: var(--gold); letter-spacing: 10px; font-size: 3.5rem; text-transform: uppercase; margin: 0; }
        .countdown-container { width: 100%; max-width: 800px; margin: 0 auto 3rem auto; background: rgba(13, 19, 31, 0.8); border: 1px solid var(--teal); border-bottom: 4px solid var(--teal); padding: 25px; position: relative; box-shadow: 0 0 30px rgba(55, 169, 169, 0.15); clip-path: polygon(0 0, 100% 0, 98% 100%, 2% 100%); display: flex; flex-direction: column; align-items: center; gap: 15px; animation: hudPulse 4s infinite; }
        @keyframes hudPulse { 0%, 100% { border-color: var(--teal); } 50% { border-color: #64ffff; } }
        .next-op-title { font-family: 'Orbitron'; font-size: 1.8rem; color: #fff; text-shadow: 0 0 15px #fff; text-transform: uppercase; letter-spacing: 3px; text-align: center; }
        .timer-hud { display: flex; gap: 20px; }
        .timer-unit { display: flex; flex-direction: column; align-items: center; min-width: 80px; }
        .timer-val { font-family: 'Orbitron'; font-size: 2.5rem; font-weight: 900; color: #fff; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 4px; border-bottom: 2px solid var(--teal); width: 100%; text-align: center; }
        .timer-label { font-size: 0.6rem; font-family: 'Orbitron'; color: var(--teal); margin-top: 5px; letter-spacing: 2px; }
        .legend { display: flex; justify-content: center; gap: 2rem; margin-bottom: 3rem; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: 600; color: #888; letter-spacing: 1px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot.patch { background: var(--gold); } .dot.hero { background: var(--teal); } .dot.season { background: var(--red); } .dot.twitch { background: var(--twitch); }
        
        .roadmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .h-cell { background: #0d131f; padding: 15px; text-align: center; font-size: 0.7rem; color: #5d7599; font-family: 'Orbitron'; font-weight: bold; }
        .roadmap-grid .h-cell:nth-child(6), .roadmap-grid .h-cell:nth-child(7) { background: #141b2a; color: var(--gold); }
        .cell { background: var(--cell); min-height: 160px; max-height: 480px; padding: 8px; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: thin; position: relative; }
        .cell.weekend { background: #0c1421; }
        .num-container { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .num { font-family: 'Orbitron'; font-size: 0.8rem; color: #5d7599; font-weight: bold; }
        .month-tag { font-family: 'Orbitron'; font-size: 0.6rem; color: var(--gold); opacity: 0.5; }
        .cell.today { outline: 2px solid var(--gold); background: rgba(220, 182, 59, 0.05); z-index: 2; }
        .cell.today .num { color: var(--gold); }
        
        .event { display: block; text-decoration: none; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--gold); margin-bottom: 8px; flex-shrink: 0; overflow: hidden; border-radius: 2px; transition: 0.2s; cursor: help; padding: 8px; }
        .event:hover { border-color: #fff !important; transform: translateY(-2px); }
        .event.patch { border-color: var(--gold); } .event.hero { border-color: var(--teal); } .event.season { border-color: var(--red); } .event.twitch { border-color: var(--twitch); }
        .e-title { font-weight: bold; color: var(--gold); font-family: 'Orbitron'; font-size: 0.55rem; line-height: 1.2; text-transform: uppercase; }
        .event.hero .e-title { color: var(--teal); } .event.season .e-title { color: var(--red); } .event.twitch .e-title { color: #bf94ff; }

        #global-briefing { display: none; position: fixed; width: 450px; max-height: 85vh; overflow-y: auto; background: #0d131f; border: 2px solid var(--gold); padding: 0; z-index: 10000; box-shadow: 0 0 100px rgba(0,0,0,1); pointer-events: none; backdrop-filter: blur(25px); scrollbar-width: thin; }
        .briefing-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 2px solid var(--border); display: none; }
        .briefing-content { padding: 25px; }
        .briefing-tag { font-family: 'Orbitron'; font-size: 1rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 10px; display: block; text-transform: uppercase; }
        .briefing-desc { font-size: 18px; line-height: 1.6; color: #fff; text-shadow: 0 1px 2px #000; font-weight: 500; white-space: pre-wrap; word-wrap: break-word; }

        @media (max-width: 1000px) { .roadmap-grid { grid-template-columns: repeat(1, 1fr); } #global-briefing { width: 95%; left: 2.5% !important; top: 50% !important; transform: translateY(-50%); } }
    </style>
</head>
<body>

    <div class="container">
        <header class="header"><h1>PREDECESSOR</h1></header>
        <div class="countdown-container" id="hud">
            <div class="next-op-title" id="op-title">STANDBY</div>
            <div class="timer-hud">
                <div class="timer-unit"><div class="timer-val" id="d">00</div><div class="timer-label">DAYS</div></div>
                <div class="timer-unit"><div class="timer-val" id="h">00</div><div class="timer-label">HRS</div></div>
                <div class="timer-unit"><div class="timer-val" id="m">00</div><div class="timer-label">MIN</div></div>
                <div class="timer-unit"><div class="timer-val" id="s">00</div><div class="timer-label">SEC</div></div>
            </div>
        </div>
        <div class="legend">
            <div class="legend-item"><div class="dot patch"></div> PATCH RELEASE</div>
            <div class="legend-item"><div class="dot hero"></div> NEW HERO / DEV</div>
            <div class="legend-item"><div class="dot season"></div> SEASON / EVENT</div>
            <div class="legend-item"><div class="dot twitch"></div> TWITCH STREAM</div>
        </div>
        <div class="roadmap-grid" id="main-grid"></div>
    </div>
    <div id="global-briefing">
        <img id="b-img" class="briefing-img" src="" alt="Visual">
        <div class="briefing-content"><span id="b-tag" class="briefing-tag"></span><div id="b-desc" class="briefing-desc"></div></div>
    </div>

    <script>
        let evData = []; const today = new Date();
        const briefing = document.getElementById('global-briefing'), bImg = document.getElementById('b-img');

        async function init() {
            try {
                const r = await fetch('./events.json?t=' + Date.now());
                const data = await r.json();
                evData = data.events || [];
                setupCountdown();
                renderRoadmap();
            } catch(e) { renderRoadmap(); }
        }

        function setupCountdown() {
            const now = Date.now();
            const futureEvents = evData
                .map(e => ({ ...e, time: Date.parse(e.iso_date || e.date + "T00:00:00Z") }))
                .filter(e => e.time > now)
                .sort((a, b) => a.time - b.time);
            if (futureEvents.length > 0) {
                const nextEv = futureEvents[0];
                document.getElementById('op-title').innerText = nextEv.title;
                setInterval(() => {
                    const diff = nextEv.time - Date.now();
                    if (diff < 0) { window.location.reload(); return; }
                    document.getElementById('d').innerText = String(Math.floor(diff/864e5)).padStart(2,'0');
                    document.getElementById('h').innerText = String(Math.floor((diff%864e5)/36e5)).padStart(2,'0');
                    document.getElementById('m').innerText = String(Math.floor((diff%36e5)/6e4)).padStart(2,'0');
                    document.getElementById('s').innerText = String(Math.floor((diff%6e4)/1000)).padStart(2,'0');
                }, 1000);
            } else { document.getElementById('op-title').innerText = "NO UPCOMING OPS"; }
        }

        function renderRoadmap() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "MON TUE WED THU FRI SAT SUN".split(" ").map(d => `<div class="h-cell">${d}</div>`).join("");
            let startDate = new Date(); startDate.setDate(startDate.getDate() - 15);
            let dayOffset = startDate.getDay(); startDate.setDate(startDate.getDate() - (dayOffset === 0 ? 6 : dayOffset - 1));
            let endDate = new Date(); endDate.setDate(endDate.getDate() + 15);
            let endDayOffset = endDate.getDay(); endDate.setDate(endDate.getDate() + (endDayOffset === 0 ? 0 : 7 - endDayOffset));
            let cursor = new Date(startDate);
            while (cursor <= endDate) {
                const dStr = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(cursor.getDate()).padStart(2,'0')}`;
                const items = evData.filter(e => e.date === dStr);
                const isToday = cursor.toDateString() === today.toDateString();
                const isWeekend = cursor.getDay() === 0 || cursor.getDay() === 6;
                const cell = document.createElement('div');
                cell.className = `cell active ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}`;
                let cellHtml = `<div class="num-container"><span class="num">${cursor.getDate()}</span><span class="month-tag">${cursor.toLocaleString('default',{month:'short'}).toUpperCase()}</span></div>`;
                items.forEach(ev => {
                    cellHtml += `<a href="${ev.url || '#'}" target="_blank" class="event ${ev.type}" onmouseenter="showBriefing(event, ${JSON.stringify(ev).replace(/"/g, '&quot;')})" onmouseleave="hideBriefing()"><div class="e-title">${ev.title}</div></a>`;
                });
                cell.innerHTML = cellHtml; grid.appendChild(cell); cursor.setDate(cursor.getDate() + 1);
            }
        }

        window.showBriefing = function(e, eventObj) {
            const rect = e.currentTarget.getBoundingClientRect();
            let color = "var(--gold)";
            if(eventObj.type === "hero") color = "var(--teal)"; if(eventObj.type === "season") color = "var(--red)"; if(eventObj.type === "twitch") color = "var(--twitch)";
            briefing.style.borderColor = color;
            document.getElementById('b-tag').style.color = color;
            document.getElementById('b-tag').innerText = eventObj.title;
            document.getElementById('b-desc').innerText = eventObj.desc;
            if (eventObj.image) { bImg.src = eventObj.image; bImg.style.display = 'block'; } else { bImg.style.display = 'none'; }
            briefing.style.display = 'block';
            let x = rect.left + rect.width + 20, y = rect.top;
            if (x + 450 > window.innerWidth) x = rect.left - 470;
            if (y + briefing.offsetHeight > window.innerHeight) y = window.innerHeight - briefing.offsetHeight - 40;
            briefing.style.left = x + 'px'; briefing.style.top = Math.max(40, y) + 'px';
        };

        window.hideBriefing = function() { briefing.style.display = 'none'; };
        init();
    </script>
</body>
</html>
