<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredCalendar | Live Roadmap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'StoricaHeavy';
            src: url('./fonts/Storica-Heavy.woff2') format('woff2');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        :root { 
            --gold-light: #FBEB61; --gold-dark: #C48400; --gold: #dcb63b; 
            --teal: #37a9a9; --red: #c73843; --twitch: #9146ff; --youtube: #FF0000; 
            --quest: #3498db;
            --bg: #06080d; --cell-glass: rgba(9, 14, 22, 0.85); --border: #1e2638; 
            --text: #c8d0e0; --hud-glow: rgba(220, 182, 59, 0.4); --glass-blur: blur(25px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; 
            padding: 2rem 1rem; min-height: 100vh; position: relative; overflow-x: hidden;
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('./img/bg.jpg') no-repeat center center; background-size: cover;
            opacity: 0.10; mix-blend-mode: luminosity; z-index: -1; pointer-events: none;
        }
        
        .container { max-width: 1550px; margin: 0 auto; width: 100%; position: relative; z-index: 1; }

        .header { text-align: center; margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; }
        .header h1 { 
            font-family: 'StoricaHeavy', sans-serif; font-size: 4.5rem; text-transform: uppercase; margin: 0; letter-spacing: 2px;
            background: linear-gradient(to bottom, var(--gold-light) 20%, var(--gold-dark) 90%);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
        }
        .subline { font-family: 'Inter', sans-serif; color: #ffffff; font-size: 1.1rem; letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; font-weight: 600; text-shadow: 0 2px 4px rgba(0,0,0,0.9); }

        .huds-wrapper { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; width: 100%; margin-bottom: 2rem; }
        .hud-column { display: flex; flex-direction: column; gap: 20px; }

        .hud-card { 
            flex: 1; background: var(--cell-glass); backdrop-filter: var(--glass-blur); border: 1px solid var(--gold); border-bottom: 4px solid var(--gold); 
            padding: 25px 20px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.6); border-radius: 4px;
            display: flex; flex-direction: column; align-items: center; text-align: center;
        }

        #hud-next { border-color: var(--gold); animation: pulseGold 4s infinite; }
        #hud-daily { border-color: var(--teal); border-bottom: 4px solid var(--teal); animation: pulseTeal 4s infinite; }
        #hud-quests { border-color: var(--quest); border-bottom: 4px solid var(--quest); animation: pulseQuest 4s infinite; }
        #hud-drops { border-color: var(--twitch); border-bottom: 4px solid var(--twitch); animation: pulseTwitch 4s infinite; }
        
        @keyframes pulseGold { 0%, 100% { border-color: var(--gold); box-shadow: 0 0 15px rgba(220,182,59,0.1); } 50% { border-color: var(--gold-light); box-shadow: 0 0 30px rgba(220,182,59,0.25); } }
        @keyframes pulseTeal { 0%, 100% { border-color: var(--teal); box-shadow: 0 0 15px rgba(55,169,169,0.1); } 50% { border-color: #64ffff; box-shadow: 0 0 30px rgba(55,169,169,0.25); } }
        @keyframes pulseQuest { 0%, 100% { border-color: var(--quest); box-shadow: 0 0 15px rgba(52,152,219,0.1); } 50% { border-color: #5dade2; box-shadow: 0 0 30px rgba(52,152,219,0.25); } }
        @keyframes pulseTwitch { 0%, 100% { border-color: var(--twitch); box-shadow: 0 0 15px rgba(145,70,255,0.1); } 50% { border-color: #b985ff; box-shadow: 0 0 30px rgba(145,70,255,0.25); } }

        .hud-label { font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; font-weight: 800; }
        .hud-title { font-size: 1.3rem; color: #fff; text-transform: uppercase; letter-spacing: 1px; line-height: 1.2; font-weight: 900; margin-bottom: 15px; min-height: 3rem; display: flex; align-items: center; justify-content: center; }
        .hud-img { width: 100%; height: 140px; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 15px; background: #0a0f18; }
        
        .timer-hud { display: flex; gap: 8px; margin-top: auto; }
        .timer-unit { display: flex; flex-direction: column; align-items: center; }
        .timer-val { font-family: 'StoricaHeavy', sans-serif; font-size: 1.8rem; color: #fff; background: rgba(0,0,0,0.4); padding: 8px 0; border-radius: 4px; border-bottom: 2px solid var(--gold); width: 60px; text-align: center; }
        .timer-label { font-size: 0.5rem; color: var(--gold); margin-top: 4px; letter-spacing: 1px; font-weight: 900; }
        
        .center .hud-card { flex: none; padding: 15px 20px; }
        .center .hud-title { font-size: 1.1rem; margin-bottom: 10px; min-height: 0; }
        .center .timer-val { font-size: 1.4rem; width: 45px; padding: 4px 0; }

        .drops-list { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; flex: 1; overflow-y: auto; max-height: 250px; scrollbar-width: thin; }
        .reward-card { background: rgba(0,0,0,0.5); border: 1px solid rgba(145, 70, 255, 0.3); border-radius: 4px; padding: 8px; display: flex; align-items: center; gap: 12px; }
        .reward-img { width: 40px; height: 40px; object-fit: contain; }
        .reward-name { font-size: 0.7rem; color: #fff; font-weight: 900; }
        .reward-req { font-size: 0.65rem; color: var(--twitch); font-weight: 800; }

        .calendar-nav { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .nav-btn { background: var(--cell-glass); border: 1px solid var(--gold); color: var(--gold); padding: 10px 25px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }
        .nav-btn.active { background: var(--gold); color: #000; pointer-events: none; }

        .roadmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: rgba(55, 169, 169, 0.2); border: 1px solid rgba(55, 169, 169, 0.2); }
        .h-cell { background: var(--cell-glass); padding: 15px; text-align: center; font-size: 0.75rem; color: #5d7599; font-weight: 900; }
        .cell { background: var(--cell-glass); min-height: 160px; max-height: 480px; padding: 8px; display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: thin; position: relative; }
        .num { font-size: 0.9rem; color: #fff; font-weight: 900; }
        .cell.today { outline: 2px solid var(--gold); background: rgba(220, 182, 59, 0.15); z-index: 2; }
        
        /* BARS LOGIC */
        .drop-bar { height: 6px; background: var(--twitch); margin: 2px 0 8px 0; border-radius: 3px; width: 100%; box-shadow: 0 0 8px var(--twitch); position: relative; }
        .drop-bar::after { content: "DROPS ACTIVE"; position: absolute; top: -10px; left: 0; font-size: 0.4rem; color: var(--twitch); font-weight: 900; }
        
        /* NEW YELLOW EVENT BAR */
        .event-bar { height: 6px; background: var(--gold); margin: 2px 0 8px 0; border-radius: 3px; width: 100%; box-shadow: 0 0 8px var(--gold); position: relative; }
        .event-bar::after { content: "EVENT ACTIVE"; position: absolute; top: -10px; left: 0; font-size: 0.4rem; color: var(--gold); font-weight: 900; }

        .event { display: block; text-decoration: none; background: rgba(0, 0, 0, 0.7); border: 1px solid var(--gold); margin-bottom: 8px; border-radius: 2px; padding: 8px; cursor: pointer; }
        .e-title { font-weight: 900; color: var(--gold); font-size: 0.6rem; text-transform: uppercase; }

        #global-briefing { display: none; position: fixed; width: 450px; max-height: 85vh; background: rgba(13, 19, 31, 0.9); border: 2px solid var(--gold); z-index: 10000; pointer-events: none; }
        .briefing-img { width: 100%; height: 200px; object-fit: cover; }
        .briefing-content { padding: 25px; }
        .briefing-tag { font-size: 0.9rem; color: var(--gold); margin-bottom: 15px; font-weight: 900; text-transform: uppercase; }
        .briefing-desc { font-size: 18px; color: #fff; white-space: pre-wrap; }

        @media (max-width: 1300px) { .huds-wrapper { grid-template-columns: 1fr; } .roadmap-grid { grid-template-columns: repeat(1, 1fr); } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>PredCalendar</h1>
            <div class="subline">Unofficial Predecessor Event Calendar</div>
        </header>

        <div class="huds-wrapper">
            <div class="hud-column">
                <div class="hud-card" id="hud-next">
                    <span class="hud-label" style="color: var(--gold);">NEXT EVENT</span>
                    <div class="hud-title" id="op-title">STANDBY</div>
                    <img id="hud-next-img" class="hud-img" src="" alt="Visual" style="display: none;">
                    <div class="timer-hud">
                        <div class="timer-unit"><div class="timer-val" id="d">00</div><div class="timer-label">DAYS</div></div>
                        <div class="timer-unit"><div class="timer-val" id="h">00</div><div class="timer-label">HRS</div></div>
                        <div class="timer-unit"><div class="timer-val" id="m">00</div><div class="timer-label">MIN</div></div>
                        <div class="timer-unit"><div class="timer-val" id="s">00</div><div class="timer-label">SEC</div></div>
                    </div>
                </div>
            </div>

            <div class="hud-column center">
                <div class="hud-card" id="hud-daily">
                    <span class="hud-label" style="color: var(--teal);">DAILY RESET (10 AM CEST)</span>
                    <div class="hud-title">ION LOOT CORE</div>
                    <div class="timer-hud">
                        <div class="timer-unit"><div class="timer-val" id="daily-h">00</div><div class="timer-label">HRS</div></div>
                        <div class="timer-unit"><div class="timer-val" id="daily-m">00</div><div class="timer-label">MIN</div></div>
                        <div class="timer-unit"><div class="timer-val" id="daily-s">00</div><div class="timer-label">SEC</div></div>
                    </div>
                </div>
                <div class="hud-card" id="hud-quests">
                    <span class="hud-label" style="color: var(--quest);">DAILY RESET (12 PM CEST)</span>
                    <div class="hud-title">DAILY QUESTS</div>
                    <div class="timer-hud">
                        <div class="timer-unit"><div class="timer-val" id="quest-h">00</div><div class="timer-label">HRS</div></div>
                        <div class="timer-unit"><div class="timer-val" id="quest-m">00</div><div class="timer-label">MIN</div></div>
                        <div class="timer-unit"><div class="timer-val" id="quest-s">00</div><div class="timer-label">SEC</div></div>
                    </div>
                </div>
            </div>

            <div class="hud-column">
                <div class="hud-card" id="hud-drops">
                    <span class="hud-label" style="color: var(--twitch);">TWITCH DROPS</span>
                    <div class="hud-title" id="drops-title">SCANNING...</div>
                    <div id="drops-rewards" class="drops-list"></div>
                    <div id="drops-timer-container" style="margin-top:10px; display:none;">
                        <div class="timer-hud">
                            <div class="timer-unit"><div class="timer-val" id="dr-d" style="font-size:1.2rem; width:45px;">00</div><div class="timer-label">DAYS</div></div>
                            <div class="timer-unit"><div class="timer-val" id="dr-h" style="font-size:1.2rem; width:45px;">00</div><div class="timer-label">HRS</div></div>
                            <div class="timer-unit"><div class="timer-val" id="dr-m" style="font-size:1.2rem; width:45px;">00</div><div class="timer-label">MIN</div></div>
                            <div class="timer-unit"><div class="timer-val" id="dr-s" style="font-size:1.2rem; width:45px;">00</div><div class="timer-label">SEC</div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="calendar-nav">
            <button class="nav-btn" onclick="shiftView(-3)">← PREV</button>
            <button class="nav-btn active" id="btn-curr" onclick="resetView()">CURRENT</button>
            <button class="nav-btn" onclick="shiftView(3)">NEXT →</button>
        </div>
        <div class="roadmap-grid" id="main-grid"></div>
    </div>

    <div id="global-briefing">
        <img id="b-img" class="briefing-img" src="" alt="">
        <div class="briefing-content"><span id="b-tag" class="briefing-tag"></span><div id="b-desc" class="briefing-desc"></div></div>
    </div>

    <script>
        let evData = []; let dropData = {active: false, campaigns: []}; 
        const today = new Date(); let currentWeekOffset = 0;
        const grid = document.getElementById('main-grid'), briefing = document.getElementById('global-briefing'), bImg = document.getElementById('b-img'), hudImg = document.getElementById('hud-next-img');

        async function init() {
            try {
                const r = await fetch('./events.json?t=' + Date.now());
                const data = await r.json(); evData = data.events || [];
                const dr = await fetch('./drops.json?t=' + Date.now());
                dropData = await dr.json();
                setupCountdown(); setupDrops(dropData); setupDailyCountdown(); renderRoadmap();
            } catch(e) { renderRoadmap(); }
        }

        function setupDrops(data) {
            const titleEl = document.getElementById('drops-title'), container = document.getElementById('drops-rewards'), timerHUD = document.getElementById('drops-timer-container');
            if (data.active && data.campaigns.length > 0) {
                titleEl.innerText = "ACTIVE NOW"; timerHUD.style.display = "block";
                let html = "";
                data.campaigns.forEach(camp => {
                    const end = Date.parse(camp.end);
                    if (!isNaN(end)) {
                        setInterval(() => {
                            const diff = end - Date.now();
                            if (diff > 0) {
                                document.getElementById('dr-d').innerText = String(Math.floor(diff/864e5)).padStart(2,'0');
                                document.getElementById('dr-h').innerText = String(Math.floor((diff%864e5)/36e5)).padStart(2,'0');
                                document.getElementById('dr-m').innerText = String(Math.floor((diff%36e5)/6e4)).padStart(2,'0');
                                document.getElementById('dr-s').innerText = String(Math.floor((diff%6e4)/1000)).padStart(2,'0');
                            }
                        }, 1000);
                    }
                    camp.rewards.forEach(rew => {
                        html += `<div class="reward-card"><img src="${rew.image}" class="reward-img"><div class="reward-info"><span class="reward-name">${rew.name}</span><span class="reward-req">${Math.round(rew.minutes/60)}h</span></div></div>`;
                    });
                });
                container.innerHTML = html;
            } else { titleEl.innerText = "NONE ACTIVE"; }
        }

        function shiftView(weeks) { currentWeekOffset += weeks; renderRoadmap(); }
        function resetView() { currentWeekOffset = 0; renderRoadmap(); }

        function renderRoadmap() {
            grid.innerHTML = "MON TUE WED THU FRI SAT SUN".split(" ").map(d => `<div class="h-cell">${d}</div>`).join("");
            let start = new Date(); start.setDate(start.getDate() - 10 + (currentWeekOffset * 7));
            let dayOffset = start.getDay(); start.setDate(start.getDate() - (dayOffset === 0 ? 6 : dayOffset - 1));
            start.setDate(start.getDate() + 7);
            let end = new Date(start); end.setDate(end.getDate() + 20);
            let cursor = new Date(start);
            while (cursor <= end) {
                const dStr = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(cursor.getDate()).padStart(2,'0')}`;
                const items = evData.filter(e => e.date === dStr);
                const isT = cursor.toDateString() === today.toDateString();
                const cell = document.createElement('div');
                cell.className = `cell ${isT ? 'today' : ''}`;
                
                let html = `<span class="num">${cursor.getDate()}</span>`;
                
                // 1. Check for Twitch Drop Bar
                if (dropData.active) {
                    const activeCamp = dropData.campaigns.find(c => {
                        const s = c.start.split('T')[0], e = c.end.split('T')[0];
                        return dStr >= s && dStr <= e;
                    });
                    if (activeCamp) html += `<div class="drop-bar"></div>`;
                }

                // 2. Check for Multi-day Event Bar (The Yellow Line)
                const activeEvent = evData.find(ev => ev.end_date && dStr >= ev.date && dStr <= ev.end_date);
                if (activeEvent) html += `<div class="event-bar"></div>`;

                cell.innerHTML = html;
                
                // Add event clicks/hovers
                items.forEach(ev => {
                    const el = document.createElement('div');
                    el.className = `event ${ev.type}`;
                    el.innerHTML = `<div class="e-title">${ev.title}</div>`;
                    el.onmouseenter = (e) => showBriefing(e, ev);
                    el.onmouseleave = () => briefing.style.display = 'none';
                    cell.appendChild(el);
                });
                grid.appendChild(cell); cursor.setDate(cursor.getDate() + 1);
            }
        }

        function setupCountdown() {
            const now = Date.now();
            const futureEvents = evData.map(e => ({ ...e, time: Date.parse(e.iso_date) })).filter(e => e.time > now).sort((a, b) => a.time - b.time);
            if (futureEvents.length > 0) {
                const nextEv = futureEvents[0]; document.getElementById('op-title').innerText = nextEv.title;
                if (nextEv.image) { hudImg.src = nextEv.image; hudImg.style.display = 'block'; }
                setInterval(() => {
                    const diff = nextEv.time - Date.now();
                    if (diff < 0) return;
                    document.getElementById('d').innerText = String(Math.floor(diff/864e5)).padStart(2,'0');
                    document.getElementById('h').innerText = String(Math.floor((diff%864e5)/36e5)).padStart(2,'0');
                    document.getElementById('m').innerText = String(Math.floor((diff%36e5)/6e4)).padStart(2,'0');
                    document.getElementById('s').innerText = String(Math.floor((diff%6e4)/1000)).padStart(2,'0');
                }, 1000);
            }
        }

        function setupDailyCountdown() {
            setInterval(() => {
                const now = Date.now();
                const targetLoot = new Date(); targetLoot.setUTCHours(8, 0, 0, 0);
                if (now >= targetLoot.getTime()) targetLoot.setUTCDate(targetLoot.getUTCDate() + 1);
                const diffLoot = targetLoot.getTime() - now;
                const targetQuests = new Date(); targetQuests.setUTCHours(10, 0, 0, 0);
                if (now >= targetQuests.getTime()) targetQuests.setUTCDate(targetQuests.getUTCDate() + 1);
                const diffQuests = targetQuests.getTime() - now;

                document.getElementById('daily-h').innerText = String(Math.floor((diffLoot % 864e5) / 36e5)).padStart(2, '0');
                document.getElementById('daily-m').innerText = String(Math.floor((diffLoot % 36e5) / 6e4)).padStart(2, '0');
                document.getElementById('daily-s').innerText = String(Math.floor((diffLoot % 6e4) / 1000)).padStart(2, '0');
                document.getElementById('quest-h').innerText = String(Math.floor((diffQuests % 864e5) / 36e5)).padStart(2, '0');
                document.getElementById('quest-m').innerText = String(Math.floor((diffQuests % 36e5) / 6e4)).padStart(2, '0');
                document.getElementById('quest-s').innerText = String(Math.floor((diffQuests % 6e4) / 1000)).padStart(2, '0');
            }, 1000);
        }

        window.showBriefing = function(e, obj) {
            const rect = e.currentTarget.getBoundingClientRect();
            document.getElementById('b-tag').innerText = obj.title;
            document.getElementById('b-desc').innerText = obj.desc;
            if (obj.image) { bImg.src = obj.image; bImg.style.display = 'block'; } else { bImg.style.display = 'none'; }
            briefing.style.display = 'block';
            let x = rect.left + rect.width + 20;
            if (x + 450 > window.innerWidth) x = rect.left - 470;
            briefing.style.left = x + 'px';
            briefing.style.top = rect.top + 'px';
        };

        init();
    </script>
</body>
</html>
