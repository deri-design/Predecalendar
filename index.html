<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predecessor | Live Roadmap</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #dcb63b; --teal: #37a9a9; --bg: #06080d; --cell: #090e16; --border: #1e2638; --text: #c8d0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; padding: 1.5rem; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-family: 'Orbitron'; color: var(--gold); letter-spacing: 5px; font-size: 2.8rem; text-transform: uppercase; text-shadow: 0 0 15px rgba(220,182,59,0.3); }
        .st-bar { font-family: 'Orbitron'; font-size: 0.65rem; color: var(--teal); margin-top: 10px; text-transform: uppercase; }
        .calendars { display: flex; gap: 1rem; }
        .section { flex: 1; min-width: 0; }
        .m-name { font-family: 'Orbitron'; color: var(--gold); text-align: center; margin-bottom: 1rem; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); }
        .h-cell { background: #0d131f; padding: 10px; text-align: center; font-size: 0.6rem; color: #5d7599; font-family: 'Orbitron'; font-weight: bold; }
        .cell { background: var(--cell); min-height: 180px; max-height: 450px; padding: 5px; display: flex; flex-direction: column; position: relative; overflow: visible; }
        .today { outline: 1px solid var(--gold); background: rgba(220, 182, 59, 0.05); }
        .num { font-family: 'Orbitron'; font-size: 0.75rem; color: #5d7599; margin: 4px; font-weight: bold; }
        .active .num { color: #fff; }
        
        /* EVENT CARD WITH IMAGE SUPPORT */
        .event { position: relative; display: block; text-decoration: none; background: rgba(0, 0, 0, 0.8); border: 1px solid var(--border); border-left: 3px solid var(--gold); margin-bottom: 8px; flex-shrink: 0; overflow: hidden; border-radius: 2px; transition: 0.2s; cursor: crosshair; }
        .event:hover { border-color: #fff; transform: scale(1.02); z-index: 100; }
        .event.news { border-left-color: var(--teal); }
        .event-img { width: 100%; height: 70px; object-fit: cover; display: block; background: #111; border-bottom: 1px solid var(--border); }
        .info { padding: 6px; }
        .e-title { font-weight: bold; color: var(--gold); font-family: 'Orbitron'; font-size: 0.55rem; line-height: 1.2; text-transform: uppercase; }
        .event.news .e-title { color: var(--teal); }

        /* POPUP */
        .briefing { display: none; position: absolute; left: 105%; top: 0; width: 550px; background: #0d131f; border: 2px solid var(--gold); padding: 25px; z-index: 999; box-shadow: 0 0 50px rgba(0,0,0,1); pointer-events: none; backdrop-filter: blur(15px); }
        .event:hover .briefing { display: block; }
        .section:nth-child(3) .briefing { left: auto; right: 105%; }
        .briefing-tag { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--gold); letter-spacing: 3px; margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 10px; display: block; }
        .briefing-desc { font-size: 1.6rem; line-height: 1.4; color: #fff; text-shadow: 0 2px 4px #000; font-weight: 500; white-space: pre-wrap; word-wrap: break-word; }
        .briefing-date { display: block; margin-top: 20px; font-size: 1.2rem; color: var(--teal); font-family: 'Orbitron'; border-top: 2px solid var(--border); padding-top: 12px; }
        @media (max-width: 1400px) { .calendars { flex-direction: column; gap: 3rem; } .briefing { left: 0; top: 105%; width: 100%; } .section:nth-child(3) .briefing { right: 0; } }
    </style>
</head>
<body>
    <div class="header"><h1>PREDECESSOR LIVE ROADMAP</h1><div id="st" class="st-bar">Connecting...</div></div>
    <div class="calendars">
        <div class="section"><h2 class="m-name" id="l1"></h2><div class="grid" id="g1"></div></div>
        <div class="section"><h2 class="m-name" id="l2"></h2><div class="grid" id="g2"></div></div>
        <div class="section"><h2 class="m-name" id="l3"></h2><div class="grid" id="g3"></div></div>
    </div>
    <script>
        let evData = []; const today = new Date();
        let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);
        async function init() {
            try {
                const r = await fetch('./events.json?t=' + Date.now());
                const data = await r.json();
                evData = data.events || [];
                document.getElementById('st').innerText = `LIVE SYNC: ${evData.length} TARGETS ACQUIRED | ${data.last_updated}`;
                render();
            } catch(e) { document.getElementById('st').innerText = "CONNECTION LOST"; render(); }
        }
        function draw(date, gId, lId) {
            const g = document.getElementById(gId), l = document.getElementById(lId);
            const m = date.getMonth(), y = date.getFullYear();
            l.innerText = date.toLocaleString('default', { month: 'long', year: 'numeric' }).toUpperCase();
            g.innerHTML = "MON TUE WED THU FRI SAT SUN".split(" ").map(d => `<div class="h-cell">${d}</div>`).join("");
            let start = new Date(y, m, 1).getDay(); start = (start === 0) ? 7 : start;
            const count = new Date(y, m + 1, 0).getDate();
            for (let i = 1; i < start; i++) g.innerHTML += `<div class="cell"></div>`;
            for (let d = 1; d <= count; d++) {
                const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const items = evData.filter(e => e.date === dStr);
                const isT = d===today.getDate() && m===today.getMonth() && y===today.getFullYear();
                let html = `<div class="cell active ${isT?'today':''}"><div class="num">${d}</div>`;
                items.forEach(e => {
                    const type = e.type === 'patch' ? 'patch' : 'news';
                    html += `<a href="${e.url || '#'}" target="_blank" class="event ${type}">
                        ${e.image ? `<img src="${e.image}" class="event-img" onerror="this.style.display='none'">` : ''}
                        <div class="info"><div class="e-title">${e.title}</div></div>
                        <div class="briefing">
                            <span class="briefing-tag">DISCORD INTEL // ${type.toUpperCase()}</span>
                            <div class="briefing-desc">${e.desc}</div>
                            <span class="briefing-date">TARGET DEPLOYMENT: ${e.date}</span>
                        </div>
                    </a>`;
                });
                g.innerHTML += html + `</div>`;
            }
        }
        function render() {
            draw(new Date(viewDate.getFullYear(), viewDate.getMonth()-1, 1), 'g1', 'l1');
            draw(new Date(viewDate.getFullYear(), viewDate.getMonth(), 1), 'g2', 'l2');
            draw(new Date(viewDate.getFullYear(), viewDate.getMonth()+1, 1), 'g3', 'l3');
        }
        init();
    </script>
</body>
</html>
